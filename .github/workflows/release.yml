name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0            # full history required for safe push after remote moves
          persist-credentials: true # required: workflow pushes commits and tags to main

      - name: Detect version change
        id: version
        shell: bash
        run: |
          set -euo pipefail
          current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if ! [[ "$current" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: version '${current}' is not a valid semver string" >&2
            exit 1
          fi
          previous=$(git show HEAD^:Cargo.toml 2>/dev/null \
            | grep '^version' | head -1 | sed 's/.*"\(.*\)".*/\1/' \
            || echo "")
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "previous=$previous" >> "$GITHUB_OUTPUT"
          if [ "$current" = "$previous" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged (${current}), skipping release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: ${previous} -> ${current}"
          fi

      - name: Transform CHANGELOG
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          python3 .github/scripts/transform_changelog.py

      - name: Show release notes
        if: steps.version.outputs.changed == 'true'
        run: cat RELEASE_NOTES.md

      - name: Configure git identity
        if: steps.version.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit release CHANGELOG
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if [[ ! -f CHANGELOG_release.md ]]; then
            echo "ERROR: CHANGELOG_release.md not found — Transform CHANGELOG step may have failed" >&2
            exit 1
          fi
          cp CHANGELOG_release.md CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: release v${VERSION}"

      - name: Create annotated tag
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          git fetch --tags
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "ERROR: Tag v${VERSION} already exists — was this version already released?" >&2
            exit 1
          fi
          git tag -a "v${VERSION}" -m "Release v${VERSION}"

      - name: Commit post-release CHANGELOG
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          if [[ ! -f CHANGELOG_next.md ]]; then
            echo "ERROR: CHANGELOG_next.md not found — Transform CHANGELOG step may have failed" >&2
            exit 1
          fi
          cp CHANGELOG_next.md CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: prepare next development cycle"

      - name: Push release commits and tag
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
        run: |
          set -euo pipefail
          git push --atomic origin main "v${VERSION}"

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.current }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --latest
