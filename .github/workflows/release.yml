name: Release

# Triggered by version tags pushed by `cargo release --execute`.
# cargo-release handles version bumps, CHANGELOG updates, and tagging locally.
# This workflow only builds artifacts and creates the GitHub Release.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Extract release notes
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 .github/scripts/extract_release_notes.py

      - name: Show release notes
        run: cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            --latest
