name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clippy:
    name: Clippy
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: windows-latest
    needs: clippy
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Test
        run: cargo test --locked

  build:
    name: Release Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build
        run: cargo build --release --locked

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | \
            python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
            print(next(p['version'] for p in pkgs if p['name']=='sideblinder-app'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sideblinder-app-${{ steps.version.outputs.version }}-windows
          path: target/release/sideblinder-app.exe

  script-tests:
    name: Script tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Run script tests
        run: uvx pytest==9.0.3 .github/scripts/tests/ -v

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Add llvm-tools-preview component
        run: rustup component add llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Cache cargo-llvm-cov binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: cargo-llvm-cov-${{ runner.os }}-0.8.4

      - name: Install cargo-llvm-cov
        run: |
          if ! cargo llvm-cov --version 2>/dev/null | grep -qF "cargo-llvm-cov 0.8.4"; then
            cargo install cargo-llvm-cov --version 0.8.4 --locked
          fi

      - name: Measure coverage
        run: cargo llvm-cov --locked --workspace --json --output-path coverage.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage.json

      - name: Check coverage against baseline
        run: python3 scripts/check-coverage.py coverage.json coverage-baseline.json
