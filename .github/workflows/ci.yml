name: CI

# NOTE: every Windows job below forces `-j 1` / CARGO_BUILD_JOBS=1. This is
# NOT a performance tuning — removing it will break the build. `wdk-macros`
# 0.5.1 (a transitive dep via `wdk` through `sideblinder-driver`) has a race
# during parallel proc-macro expansion: two threads call File::create on the
# same scratch `.lock` file and then LockFileEx, and Windows returns
# ERROR_INVALID_FUNCTION (os error 1) instead of the expected lock-violation
# error. See CLAUDE.md -> Building for details. Upstream fix tracked at
# microsoft/windows-drivers-rs#463 (migrating fs4 -> std::File::lock); once
# that lands, `-j 1` can be dropped here.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  clippy:
    name: Clippy
    runs-on: windows-2022
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # v1
        with:
          toolchain: 1.94.1
          components: clippy

      - name: Install LLVM 17
        shell: pwsh
        run: |
          $llvmVersion = "17.0.6"
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe"
          $llvmInstaller = "$env:TEMP\LLVM-$llvmVersion-win64.exe"
          Write-Host "Downloading LLVM $llvmVersion from official release..."
          curl.exe -L -o $llvmInstaller $llvmUrl
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to download LLVM"
            exit 1
          }
          Write-Host "Installing LLVM $llvmVersion..."
          & $llvmInstaller /S /D="C:\LLVM"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to install LLVM"
            exit 1
          }
          Write-Host "LLVM installed successfully"

      - name: Verify Windows SDK and WDK
        shell: pwsh
        run: |
          Write-Host "Verifying Windows SDK and WDK installation..."

          # Verify WDK headers are available (windows-2022 includes them)
          $wdk_paths = @(
              "C:\Program Files (x86)\Windows Kits\10\Include",
              "C:\Program Files\Windows Kits\10\Include"
          )

          $found = $false
          foreach ($path in $wdk_paths) {
              if (Test-Path $path) {
                  Write-Host "✓ Found Windows Kits at: $path"
                  $found = $true
                  break
              }
          }

          if (-not $found) {
              Write-Host "ERROR: Windows Kits not found - WDK headers are required"
              exit 1
          }

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Clippy
        run: cargo clippy -j 1 --all-targets --all-features -- -D warnings
        env:
          CARGO_BUILD_JOBS: 1

  test:
    name: Test
    runs-on: windows-2022
    needs: clippy
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # v1
        with:
          toolchain: 1.94.1

      - name: Install LLVM 17
        shell: pwsh
        run: |
          $llvmVersion = "17.0.6"
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe"
          $llvmInstaller = "$env:TEMP\LLVM-$llvmVersion-win64.exe"
          Write-Host "Downloading LLVM $llvmVersion from official release..."
          curl.exe -L -o $llvmInstaller $llvmUrl
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to download LLVM"
            exit 1
          }
          Write-Host "Installing LLVM $llvmVersion..."
          & $llvmInstaller /S /D="C:\LLVM"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to install LLVM"
            exit 1
          }
          Write-Host "LLVM installed successfully"

      - name: Verify Windows SDK and WDK
        shell: pwsh
        run: |
          Write-Host "Verifying Windows SDK and WDK installation..."

          # Verify WDK headers are available (windows-2022 includes them)
          $wdk_paths = @(
              "C:\Program Files (x86)\Windows Kits\10\Include",
              "C:\Program Files\Windows Kits\10\Include"
          )

          $found = $false
          foreach ($path in $wdk_paths) {
              if (Test-Path $path) {
                  Write-Host "✓ Found Windows Kits at: $path"
                  $found = $true
                  break
              }
          }

          if (-not $found) {
              Write-Host "ERROR: Windows Kits not found - WDK headers are required"
              exit 1
          }

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Test
        run: cargo test -j 1 --locked
        env:
          CARGO_BUILD_JOBS: 1

  build:
    name: Release Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-2022
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # v1
        with:
          toolchain: 1.94.1

      - name: Install LLVM 17
        shell: pwsh
        run: |
          $llvmVersion = "17.0.6"
          $llvmUrl = "https://github.com/llvm/llvm-project/releases/download/llvmorg-$llvmVersion/LLVM-$llvmVersion-win64.exe"
          $llvmInstaller = "$env:TEMP\LLVM-$llvmVersion-win64.exe"
          Write-Host "Downloading LLVM $llvmVersion from official release..."
          curl.exe -L -o $llvmInstaller $llvmUrl
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to download LLVM"
            exit 1
          }
          Write-Host "Installing LLVM $llvmVersion..."
          & $llvmInstaller /S /D="C:\LLVM"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: Failed to install LLVM"
            exit 1
          }
          Write-Host "LLVM installed successfully"

      - name: Verify Windows SDK and WDK
        shell: pwsh
        run: |
          Write-Host "Verifying Windows SDK and WDK installation..."

          # Verify WDK headers are available (windows-2022 includes them)
          $wdk_paths = @(
              "C:\Program Files (x86)\Windows Kits\10\Include",
              "C:\Program Files\Windows Kits\10\Include"
          )

          $found = $false
          foreach ($path in $wdk_paths) {
              if (Test-Path $path) {
                  Write-Host "✓ Found Windows Kits at: $path"
                  $found = $true
                  break
              }
          }

          if (-not $found) {
              Write-Host "ERROR: Windows Kits not found - WDK headers are required"
              exit 1
          }

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Build
        run: cargo build -j 1 --release --locked
        env:
          CARGO_BUILD_JOBS: 1

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | \
            python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
            print(next(p['version'] for p in pkgs if p['name']=='sideblinder-app'))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sideblinder-app-${{ steps.version.outputs.version }}-windows
          path: target/release/sideblinder-app.exe

  script-tests:
    name: Script tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0

      - name: Run script tests
        run: uvx pytest==9.0.3 .github/scripts/tests/ -v

  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # v1
        with:
          toolchain: 1.94.1

      - name: Add llvm-tools-preview component
        run: rustup component add llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Cache cargo-llvm-cov binary
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5.0.4
        with:
          path: ~/.cargo/bin/cargo-llvm-cov
          key: cargo-llvm-cov-${{ runner.os }}-0.8.4

      - name: Install cargo-llvm-cov
        run: |
          if ! cargo llvm-cov --version 2>/dev/null | grep -qF "cargo-llvm-cov 0.8.4"; then
            cargo install cargo-llvm-cov --version 0.8.4 --locked
          fi

      - name: Measure coverage
        run: cargo llvm-cov --locked --workspace --json --output-path coverage.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: coverage.json

      - name: Check coverage against baseline
        run: python3 scripts/check-coverage.py coverage.json coverage-baseline.json
