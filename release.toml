# cargo-release configuration
# https://github.com/crate-ci/cargo-release/blob/master/docs/reference.md
#
# Usage (run from a crate directory, or -p <crate> from workspace root):
#   cargo release patch          # bump patch version
#   cargo release minor          # bump minor version
#   cargo release major          # bump major version
#
# Always do a dry-run first (default) — add --execute to actually release:
#   cargo release patch --execute
#
# NOTE: pre-release-replacements below run once per released crate.
# Do NOT use `cargo release --workspace` — it will apply the CHANGELOG
# replacements multiple times and corrupt the file. Release one crate at a time.

# Push both commits and tags to main. Commits are signed with the maintainer's
# GPG key, satisfying branch protection rules.
push = true           # push commits and tags to main
tag-message = "Release v{{version}}"

# Sign both the annotated tag and the version-bump commit with the maintainer's
# GPG key. This allows the commit to pass branch protection (requires verified signatures).
sign-tag = true
sign-commit = true

# Don't publish to crates.io — these are private application crates.
publish = false

# Commit message for the version-bump commit that is signed and pushed to main.
pre-release-commit-message = "chore: release {{crate_name}} v{{version}}"

# Keep a Changelog support — cargo-release rewrites [Unreleased] →
# [{{version}}] - {{date}} in CHANGELOG.md at release time.
# Replacement strings mix regex backrefs ($1, $2) with cargo-release
# template variables ({{version}}, {{date}}) — both are required here.
pre-release-replacements = [
  { file = "CHANGELOG.md", search = "## \\[Unreleased\\]", replace = "## [Unreleased]\n\n## [{{version}}] - {{date}}", exactly = 1 },
  { file = "CHANGELOG.md", search = "\\[Unreleased\\]: (https://.*)/compare/v([^/]+)\\.\\.\\.HEAD", replace = "[Unreleased]: $1/compare/v{{version}}...HEAD\n[{{version}}]: $1/compare/v$2...v{{version}}", exactly = 1 },
]

# When a released crate depends on another workspace crate, fix the dependency
# version requirement to match the newly released version.
dependent-version = "fix"
